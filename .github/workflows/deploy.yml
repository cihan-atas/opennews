name: Deploy to Fly.io

# Ücretsiz araçlar:
#   - Fly.io (3 shared-cpu VM ücretsiz)
#   - Neon PostgreSQL (ücretsiz, pgvector destekli)
#   - Upstash Redis (ücretsiz, 10k cmd/gün)
#   - Cloudflare R2 (ücretsiz 10GB/ay storage)
#   - edge-tts (ücretsiz TTS)
#
# Gereken GitHub Secrets:
#   FLY_API_TOKEN       → fly tokens create deploy -a newsflow-api
#   (İlk kurulum: fly auth login && fly apps create newsflow-api && fly apps create newsflow-workers)

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # 1. TEST
  # ──────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile main.py worker.py utils.py config.py models.py schemas.py

  # ──────────────────────────────────────────────
  # 2. DEPLOY — API
  # ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Fly.io
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ──────────────────────────────────────────────
  # 3. DEPLOY — Workers
  # ──────────────────────────────────────────────
  deploy-workers:
    name: Deploy Workers → Fly.io
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Workers
        run: flyctl deploy --config fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
